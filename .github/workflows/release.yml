# Build and publish Electron app to GitHub Releases (public repo ClipCast-Releases) on version tags.
# Usage: bump version in package.json, commit, then push tag (e.g. v0.1.1).
# GH_TOKEN: PAT with repo scope, stored in this (private) repo's Actions secrets; used only in CI, never shipped in the app.
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: npm ci

      - name: Verify Vite env (no secrets)
        shell: pwsh
        run: |
          $hasUrl = [string]::IsNullOrWhiteSpace($env:VITE_SUPABASE_URL) -eq $false
          $hasKey = [string]::IsNullOrWhiteSpace($env:VITE_SUPABASE_ANON_KEY) -eq $false
          Write-Host "VITE_SUPABASE_URL is set: $hasUrl"
          Write-Host "VITE_SUPABASE_ANON_KEY is set: $hasKey"

      - name: Prepare bundled Python runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "==> Create venv"
          python -m venv .venv_clipcast
          Write-Host "==> Upgrade pip"
          .\.venv_clipcast\Scripts\python.exe -m pip install --upgrade pip
          Write-Host "==> Install requirements"
          .\.venv_clipcast\Scripts\python.exe -m pip install -r yt_pipeline/requirements.txt
          Write-Host "==> Recreate vendor/python"
          if (Test-Path vendor\python) { Remove-Item -Recurse -Force vendor\python }
          New-Item -ItemType Directory -Force -Path vendor\python | Out-Null
          Write-Host "==> Copy venv to vendor/python"
          robocopy .\.venv_clipcast vendor\python /E /NFL /NDL /NJH /NJS /NP /R:1 /W:1
          $rc = $LASTEXITCODE
          Write-Host "robocopy exit code: $rc"
          if ($rc -ge 8) { throw "robocopy failed with exit code $rc" }
          $global:LASTEXITCODE = 0
          Write-Host "==> Verify copied runtime"
          if (-not (Test-Path vendor\python)) { throw "Missing vendor/python" }
          if (-not (Test-Path vendor\python\Scripts)) { throw "Missing vendor/python/Scripts" }
          if (-not (Test-Path vendor\python\Scripts\python.exe)) { throw "Missing vendor/python/Scripts/python.exe" }
          Get-Item vendor\python\Scripts\python.exe | Format-List Name,Length,FullName
          exit 0

      - name: Prepare bundled ffmpeg/ffprobe
        shell: pwsh
        run: |
          $ffmpegUrl = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          $zipPath = Join-Path $env:RUNNER_TEMP "ffmpeg.zip"
          $extractPath = Join-Path $env:RUNNER_TEMP "ffmpeg"
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile $zipPath
          if (Test-Path $extractPath) { Remove-Item -Recurse -Force $extractPath }
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
          $rootDir = Get-ChildItem -Path $extractPath -Directory | Select-Object -First 1
          if (-not $rootDir) { throw "ffmpeg archive root folder not found" }
          $binDir = Join-Path $rootDir.FullName "bin"
          if (-not (Test-Path $binDir)) { throw "ffmpeg bin folder not found: $binDir" }
          New-Item -ItemType Directory -Force -Path vendor\bin | Out-Null
          Copy-Item (Join-Path $binDir "ffmpeg.exe") -Destination vendor\bin\ffmpeg.exe -Force
          Copy-Item (Join-Path $binDir "ffprobe.exe") -Destination vendor\bin\ffprobe.exe -Force
          if (-not (Test-Path vendor\bin\ffmpeg.exe)) { throw "ffmpeg.exe missing after copy" }
          if (-not (Test-Path vendor\bin\ffprobe.exe)) { throw "ffprobe.exe missing after copy" }

      - name: Build
        run: npm run build

      - name: Release (electron-builder)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run release
